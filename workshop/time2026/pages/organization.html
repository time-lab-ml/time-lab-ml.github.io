<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organisation – TIME 2026 Workshop</title>
  <meta name="description" content="Organisation page for the TIME 2026 workshop" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="icon" href="../assets/images/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="../assets/images/favicon-192x192.png">
  <link rel="apple-touch-icon" href="../assets/images/apple-touch-icon.png">
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <div id="navbar-container"></div>
  <div id="hero-container"></div>

  <section id="organization" class="section">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">Organisation</h2>
        <div class="title-underline"></div>
      </div>
      <p class="lead">The TIME 2026 workshop is organized by an international committee bringing together expertise across web science, algorithmic fairness, security, ethics, graph analysis, and data-driven evaluation. Below you will find the full list of organisers.</p>
      <div id="organizers-container"></div>
    </div>
  </section>

  <div id="footer-container"></div>

  <script type="module">
    import { initSubpage, renderOrganizers } from '../components/app.js';
    // Provide a hero banner specific to this page
    await initSubpage({ title: 'Organisation' });
    await renderOrganizers('organizers-container', { isSubpage: true });

    const hashTarget = window.location.hash ? document.getElementById(window.location.hash.slice(1)) : null;
    if (hashTarget) {
      const navbarHeight = document.querySelector('.navbar')?.offsetHeight || 80;
      const targetTop = hashTarget.getBoundingClientRect().top + window.pageYOffset - navbarHeight - 16;
      window.scrollTo({ top: targetTop });
    }
  </script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
